<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeTriXTools API Fetcher</title>
1    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: #333;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #4a90e2;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: #357ab7;
        }

        #response {
            margin-top: 20px;
            width: 80%;
            max-width: 800px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            color: #2c3e50;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Fetch Data from HeTriXTools API</h1>
    <button onclick="fetchAPIData()">Fetch Data</button>
    <pre id="response"></pre>

    <script>
        function fetchAPIData() {
            const apiUrl = 'https://api.allorigins.win/raw?url=https://api.hetrixtools.com/v3/{endpoint}'; // All Origins Proxy
            const apiKey = 'YOUR_API_KEY'; // Replace with your HeTriXTools API Key

            fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + apiKey,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.text())  // Get response as plain text first
            .then(data => {
                console.log('Raw Response:', data);  // Log the raw response for debugging
                
                try {
                    const jsonData = JSON.parse(data);  // Try parsing the response as JSON
                    document.getElementById('response').textContent = JSON.stringify(jsonData, null, 2);
                } catch (error) {
                    console.error('Error parsing response as JSON:', error);
                    document.getElementById('response').textContent = 'Error: ' + error.message + "\n" + data;
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('response').textContent = 'Error fetching data: ' + error.message;
            });
        }
    </script>
</body>
</html>
